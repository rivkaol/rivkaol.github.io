<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>הורידי את חוברת הלחמים | רבקה הולצברג</title>
    
    <!-- פונטים ואייקונים -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-green: #1B4D3E;
            --accent-gold: #D4AF37;
            --accent-light: #F0F4F1;
            --text-dark: #222222;
            --text-gray: #4A4A4A;
            --bg-cream: #FDFBF7;
        }

        /* מניעת תזוזות וגלילה רוחבית */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%;
            overflow-x: hidden;
            background-color: var(--bg-cream);
            -webkit-font-smoothing: antialiased;
            box-sizing: border-box;
        }

        *, *:before, *:after {
            box-sizing: inherit;
        }

        body {
            font-family: 'Rubik', sans-serif;
            color: var(--text-dark);
            background: radial-gradient(circle at center, #ffffff 0%, var(--bg-cream) 100%) no-repeat fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            width: 100%;
            max-width: 500px;
            position: relative;
            z-index: 1;
        }

        .glass-card {
            background: #ffffff;
            border-radius: 28px;
            padding: 40px 30px;
            box-shadow: 0 15px 45px rgba(27, 77, 62, 0.08);
            border: 1px solid rgba(212, 175, 55, 0.15);
            text-align: center;
            animation: slideUp 0.6s ease-out;
            width: 100%;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--accent-light);
            color: var(--primary-green);
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--primary-green);
            font-size: 2.1rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 15px;
            margin-top: 0;
        }

        .subtitle {
            color: var(--text-gray);
            font-size: 1.25rem;
            margin-bottom: 30px;
        }

        /* עיצוב הטופס */
        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }

        .form-group label {
            display: block;
            color: var(--primary-green);
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 1.1rem;
            padding-right: 4px;
        }

        input[type="text"],
        input[type="email"] {
            width: 100%;
            height: 52px;
            padding: 0 16px;
            border: 1px solid #DEDEDE;
            border-radius: 12px;
            font-family: 'Rubik', sans-serif;
            font-size: 1.1rem;
            background: #FAFAFA;
            transition: all 0.3s ease;
            color: var(--text-dark);
        }

        input:focus {
            outline: none;
            border-color: var(--accent-gold);
            background: #fff;
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.08);
        }

        /* עיצוב תיבת האישור (Checkbox) - משופר למובייל */
        .checkbox-container {
            background: #F8FAF9;
            padding: 16px;
            border-radius: 16px;
            border: 1px solid #EDF2EF;
            display: flex;
            gap: 12px;
            align-items: flex-start;
            margin-bottom: 25px;
            text-align: right;
            cursor: pointer;
            transition: all 0.2s;
            /* הגדרת תגית Label כקונטיינר הופכת את כל האזור ללחיץ אוטומטית */
        }

        .checkbox-container:hover {
            border-color: var(--accent-gold);
        }

        .checkbox-container input {
            width: 22px;
            height: 22px;
            accent-color: var(--primary-green);
            cursor: pointer;
            margin-top: 2px;
            flex-shrink: 0;
        }

        .checkbox-text {
            font-size: 1.05rem;
            color: var(--text-gray);
            font-weight: 400;
            line-height: 1.4;
            margin: 0;
            cursor: pointer;
        }

        .submit-btn {
            width: 100%;
            height: 62px;
            background: linear-gradient(135deg, var(--accent-gold) 0%, #E5C565 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.35rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-family: 'Rubik', sans-serif;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(212, 175, 55, 0.35);
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .security-text {
            margin-top: 25px;
            font-size: 1.05rem;
            color: #A0A0A0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .security-text i {
            color: var(--primary-green);
        }

        .visually-hidden { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }

        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* התאמות חכמות למובייל */
        @media (max-width: 480px) {
            body {
                padding: 15px;
            }
            .glass-card { 
                padding: 30px 20px; 
                border-radius: 20px;
            }
            .badge {
                font-size: 0.9rem;
                padding: 6px 14px;
            }
            h1 { 
                font-size: 1.7rem; 
            }
            .subtitle { 
                font-size: 1.1rem; 
                margin-bottom: 20px;
            }
            .form-group label {
                font-size: 1rem;
            }
            input[type="text"],
            input[type="email"] {
                height: 48px;
                font-size: 1rem;
            }
            .checkbox-container {
                padding: 14px;
                gap: 10px;
                border-radius: 12px;
            }
            .checkbox-text {
                font-size: 0.95rem;
            }
            .checkbox-container input {
                width: 20px;
                height: 20px;
                margin-top: 0;
            }
            .submit-btn { 
                font-size: 1.25rem; 
                height: 56px; 
            }
            .security-text {
                font-size: 0.95rem;
                margin-top: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="glass-card">
            
            <div class="badge">
                <i class="fa-solid fa-book-open"></i>
                החוברת המלאה לאפייה בריאה
            </div>

            <h1>הלחמים הבריאים שכולם יאהבו אצלך במטבח</h1>
            
            <p class="subtitle">
                מתכונים פשוטים, בדוקים וטעימים.<br>
                בלי גלוטן, בלי סוכר ובלי להתפשר על הטעם של הלחם הטוב שאת אוהבת.
            </p>

            <form id="signupForm">
                
                <div class="visually-hidden">
                    <label for="honeypot">נא להשאיר שדה זה ריק</label>
                    <input type="text" id="honeypot" name="honeypot" tabindex="-1">
                </div>

                <input type="hidden" name="lead_source" value="דף נחיתה לחמים - תיקון עיצוב">

                <div class="form-group">
                    <label for="name">איך קוראים לך?</label>
                    <input 
                        type="text" 
                        id="name" 
                        name="name" 
                        placeholder="הקלידי כאן את שמך..." 
                        required 
                        minlength="2"
                    >
                </div>

                <div class="form-group">
                    <label for="email">כתובת המייל שלך</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="המייל אליו נשלח את החוברת..." 
                        required
                    >
                </div>

                <!-- שיניתי את הקונטיינר לתגית Label כדי שכל האזור יהיה לחיץ באופן טבעי ללא סקריפטים -->
                <label class="checkbox-container">
                    <input type="checkbox" id="marketing_consent" name="marketing_consent" required>
                    <span class="checkbox-text">
                        אני מסכימה לקבל מרבקה הולצברג את החוברת למייל, וכן עדכונים, מתכונים והצעות שוות. (ניתן להסיר את עצמך תמיד בקליק).
                    </span>
                </label>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <span id="btnText">שלחי לי את החוברת עכשיו</span>
                    <i class="fa-regular fa-paper-plane"></i>
                </button>
            </form>

            <div class="security-text">
                <i class="fa-solid fa-lock"></i> החוברת תישלח אלייך באופן מיידי.
            </div>
        </div>
    </div>

    <script src="https://rivkaol.github.io/legal-footer.js"></script>

    <script>
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // מנגנון הגנה מספאמרים (Honeypot)
            if (document.getElementById('honeypot').value !== "") {
                return;
            }

            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            
            btnText.innerText = "שולח...";
            btn.disabled = true;

            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());
            data.timestamp = new Date().toISOString();

            const webhookUrl = 'https://hook.eu2.make.com/lm31dmtx8enoyjhjufmqyv55wivnx4qx';

            fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data),
            })
            .then(response => {
                if (response.ok) {
                    window.location.href = 'https://rivkaholtsberg.co.il/bread-thanks/';
                } else {
                    alert("הייתה בעיה בשליחה, נסי שוב בעוד רגע.");
                    btnText.innerText = "שלחי לי את החוברת עכשיו";
                    btn.disabled = false;
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert("הייתה בעיה בשליחה, נסי שוב בעוד רגע.");
                btnText.innerText = "שלחי לי את החוברת עכשיו";
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
